name: Build Capacitor App with Retry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 17 ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
      
      - name: Clean Gradle cache (fix bcprov issue)
        run: rm -rf ~/.gradle/caches/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm install
      
      - name: Build Capacitor project
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 60
          command: npm run build
      
      - name: Sync Capacitor with Android
        run: npx cap sync android
      
      - name: Build Android APK
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 60
          command: cd android && ./gradlew clean assembleRelease --no-daemon --stacktrace
      
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Notify success
        if: success()
        run: echo "✓ Build completed successfully!"
      
      - name: Notify failure
        if: failure()
        run: echo "✗ Build failed after all retry attempts"
