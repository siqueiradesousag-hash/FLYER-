name: 🚀 Build APK - LIMPO & SEGURO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Evita disparar builds duplicados ao mesmo tempo (cancela o anterior automaticamente se você enviar outro push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run-install: false

      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Install dependencies
        run: |
          pnpm config set auto-install-peers true
          pnpm config set strict-peer-dependencies false
          pnpm install --no-frozen-lockfile --force

      - name: 🏗️ Build Capacitor web artifacts
        run: pnpm run build

      - name: 🔄 Sync Capacitor to Android
        run: npx cap sync android

      - name: 🧹 Build APK do Zero absoluto (Sem usar nenhum cache do GitHub)
        run: |
          cd android
          chmod +x gradlew
          # Roda sem daemon e sem salvar nada em cache local
          ./gradlew assembleRelease --no-daemon --no-build-cache --refresh-dependencies

      - name: 🔍 Locate and Prepare Generated APKs
        if: always()
        run: |
          mkdir -p output_apks/
          find android/ -name "*.apk" -type f -exec cp {} output_apks/ \;
          ls -la output_apks/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLYER-app-apks
          path: output_apks/
          retention-days: 30
          if-no-files-found: warn
