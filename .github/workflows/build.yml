name: 🚀 Build APK - BLINDADO & GARANTIDO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PNPM_VERSION: 9
  JAVA_VERSION: 17
  NODE_VERSION: 18
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      # 1. Checkout do código
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Configuração do Java 17
      - name: ☕ Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. Limpeza profunda de caches
      - name: 🧹 Clean corrupted Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/
          cd android && rm -rf build/ .gradle/

      # 4. Configuração do pnpm v9
      - name: 📦 Setup pnpm v9
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run-install: false

      # 5. Configuração do Node com cache
      - name: 🟢 Setup Node.js 18 + cache pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      # 6. Instalação ultra-compatível pnpm
      - name: 📥 Install dependencies
        run: |
          pnpm config set auto-install-peers true
          pnpm config set strict-peer-dependencies false
          pnpm install --no-frozen-lockfile --strict-peer-dependencies=false --force

      # 7. Build do Capacitor (Web Assets)
      - name: 🏗️ Build Capacitor web artifacts
        run: pnpm run build

      # 8. Sincronização com o Android
      - name: 🔄 Sync Capacitor to Android
        run: npx cap sync android

      # 9. Compilação do APK com Gradle (Tenta gerar o Release)
      - name: 🔨 Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 10. PASSO SALVADOR: Procurar e mapear QUALQUER APK que tenha sido gerado
      - name: 🔍 Locate and Prepare Generated APKs
        run: |
          echo "=== Procurando arquivos APK criados pelo Gradle ==="
          mkdir -p output_apks/
          find android/ -name "*.apk" -type f -exec cp {} output_apks/ \;
          echo "=== Arquivos prontos para download ==="
          ls -la output_apks/

      # 11. Upload dinâmico dos APKs encontrados (Seja Release, Debug ou Unsigned)
      - name: 📤 Upload APK artifact for download
        uses: actions/upload-artifact@v4
        with:
          name: FLYER-app-apks
          path: output_apks/
          retention-days: 30
          if-no-files-found: error
