name: 🚀 Build APK - MODO TURBO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela builds antigos automaticamente se você mandar um novo commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Padrão Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Configurar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run-install: false

      - name: 🟢 Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Instalar Dependências do Node
        run: |
          pnpm config set auto-install-peers true
          pnpm config set strict-peer-dependencies false
          pnpm install --no-frozen-lockfile --force

      - name: 🏗️ Build dos Artefatos Web do Capacitor
        run: pnpm run build

      - name: 🔄 Sincronizar Capacitor com o Android
        run: npx cap sync android

      - name: 🔨 Compilar APK em Velocidade Máxima
        run: |
          cd android
          chmod +x gradlew
          # Compila de forma limpa, direta e sem travar processos em background
          ./gradlew assembleRelease --no-daemon --parallel --no-build-cache

      - name: 🔍 Localizar e Organizar os APKs Gerados
        if: always()
        run: |
          mkdir -p output_apks/
          find android/ -name "*.apk" -type f -exec cp {} output_apks/ \;
          ls -la output_apks/

      - name: 📤 Fazer Upload do APK Finalizado
        uses: actions/upload-artifact@v4
        with:
          name: FLYER-app-apks
          path: output_apks/
          retention-days: 7
          if-no-files-found: error
