name: 🚀 Build APK - LIMPO & SEGURO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run-install: false

      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Install dependencies
        run: |
          pnpm config set auto-install-peers true
          pnpm config set strict-peer-dependencies false
          pnpm install --no-frozen-lockfile --force

      - name: 🏗️ Build Capacitor web artifacts
        run: pnpm run build

      - name: 🔄 Sync Capacitor to Android
        run: npx cap sync android

      - name: 🧹 DELETAR CACHE CORROMPIDO E COMPILAR (Limpeza Física)
        run: |
          # Remove fisicamente qualquer resquício de cache do gradle que possa estar quebrado
          rm -rf ~/.gradle/caches/
          
          cd android
          chmod +x gradlew
          # Roda o build forçando o download de tudo do zero absoluto
          ./gradlew clean assembleRelease --no-daemon --refresh-dependencies
