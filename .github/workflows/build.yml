name: 🚀 Build APK - BLINDADO COM JAVA_HOME CORRETO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Padrão Android)
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔍 Debugar JAVA_HOME
        run: |
          echo "JAVA_HOME da action: ${{ steps.setup-java.outputs.path }}"
          echo "JAVA_HOME do ambiente: $JAVA_HOME"
          java -version
          javac -version

      - name: 📦 Configurar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run-install: false

      - name: 🟢 Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: 🧹 Limpar cache corrompido
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/
          rm -rf android/build/ android/.gradle/

      - name: 📥 Instalar Dependências do Node
        run: |
          pnpm config set auto-install-peers true
          pnpm config set strict-peer-dependencies false
          pnpm install --no-frozen-lockfile --force

      - name: 🏗️ Build dos Artefatos Web do Capacitor
        run: pnpm run build

      - name: 🔄 Sincronizar Capacitor com o Android
        run: npx cap sync android

      - name: 🔨 Compilar APK em Velocidade Máxima
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          echo "JAVA_HOME configurado: $JAVA_HOME"
          echo "Verificando Java..."
          $JAVA_HOME/bin/java -version
          
          cd android
          chmod +x gradlew
          
          echo "Limpando build anterior..."
          ./gradlew clean --no-daemon
          
          echo "Compilando APK Release..."
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --no-build-cache \
            --stacktrace \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            -Dorg.gradle.daemon=false

      - name: 🔍 Localizar e Organizar os APKs Gerados
        if: always()
        run: |
          mkdir -p output_apks/
          echo "Procurando APKs..."
          find android/ -name "*.apk" -type f -exec ls -lh {} \;
          find android/ -name "*.apk" -type f -exec cp {} output_apks/ \;
          
          echo "APKs encontrados:"
          ls -lah output_apks/ || echo "Nenhum APK encontrado!"

      - name: 📤 Fazer Upload do APK Finalizado
        uses: actions/upload-artifact@v4
        with:
          name: FLYER-app-apks
          path: output_apks/
          retention-days: 7
          if-no-files-found: error

      - name: 🎉 BUILD SUCESSO
        if: success()
        run: |
          echo "✅ APK compilado com sucesso!"
          echo "📍 Acesse Artifacts > FLYER-app-apks para download"
