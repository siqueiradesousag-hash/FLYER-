name: Build Capacitor App - Production Ready

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18 ]
        java-version: [ 17 ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
      
      - name: Clean corrupted Gradle cache
        run: rm -rf ~/.gradle/caches/ ~/.gradle/wrapper/
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      
      # Força o pnpm a instalar ignorando qualquer erro de peer dependencies ou inconsistência do lockfile antigo
      - name: Install dependencies with pnpm (Forced Mode)
        run: |
          pnpm config set auto-install-peers true
          pnpm install --no-frozen-lockfile
      
      - name: Build Capacitor
        run: pnpm run build
      
      - name: Sync Capacitor to Android
        run: npx cap sync android
      
      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace
      
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
