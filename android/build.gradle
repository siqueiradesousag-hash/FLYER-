// Força a versão corrigida do Bouncy Castle globalmente para todos os projetos do build
subprojects {
    buildscript {
        configurations.all {
            resolutionStrategy {
                force 'org.bouncycastle:bcprov-jdk18on:1.80'
            }
        }
    }
    configurations.all {
        resolutionStrategy {
            force 'org.bouncycastle:bcprov-jdk18on:1.80'
        }
    }
}

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        // Espelhos rápidos para evitar quedas de conexão
        mavenCentral()
        maven { url "https://maven-central.storage-download.googleapis.com/repos/central/data/" }
        maven { url "https://plugins.gradle.org/m2/" }
        google()
        configurations.all {
            resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.80'
        }
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
