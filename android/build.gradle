
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Força a versão funcional para evitar o travamento de download do jar 1.79
        constraints {
            classpath('org.bouncycastle:bcprov-jdk18on:1.80') {
                because 'A versão 1.79 está com problemas de download no repositório'
            }
        }
    }
}


buildscript {
    configurations.all {
        resolutionStrategy {
            force 'org.bouncycastle:bcprov-jdk18on:1.80'
        }
    }
}

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
