buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.1'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    
    // Força o Gradle a ignorar assinaturas corrompidas de JARs de terceiros como o bcprov
    configurations.all {
        resolutionStrategy {
            preferProjectModules()
            // Se houver conflito de assinatura no bcprov, desativa a validação rígida
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.bouncycastle') {
                    details.useVersion '1.70' // Força uma versão super estável que não exige Java 18+
                }
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
