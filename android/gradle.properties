# JVM Arguments otimizados para GitHub Actions
org.gradle.jvmargs=-Xmx2g

# Paralelização
org.gradle.parallel=true
org.gradle.workers.max=4

# Network timeouts robustos
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.repository.max.retries=15
systemProp.org.gradle.internal.repository.retry.interval=3000

# Dependency verification desativado (compatibilidade máxima)
org.gradle.dependency.verification=off
org.gradle.configureondemand=true

# Android settings
android.useAndroidX=true
android.enableJetifier=true

# Sem daemon no CI
org.gradle.daemon=false
