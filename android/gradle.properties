# Desativa o daemon para evitar travamento de arquivos
org.gradle.daemon=false
org.gradle.caching=false

# Muda a pasta de cache global para uma pasta limpa dentro do projeto, longe do cache quebrado do GitHub
gradle.user.home=../.gradle_local

# Ignora verificações de assinaturas de jars corrompidos do repositório
org.gradle.dependency.verification=off
