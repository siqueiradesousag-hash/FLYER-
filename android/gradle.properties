# Desabilita o daemon para evitar que processos em segundo plano travem a escrita de arquivos
org.gradle.daemon=false

# Desabilita o cache local do Gradle que está falhando ao criar o JAR
org.gradle.caching=false

# Ignora a verificação de assinatura de dependências que trava o Bouncy Castle (bcprov)
org.gradle.dependency.verification=off
org.gradle.metadata-verification=false
